name: Live Reddit Fetch

on:
  schedule:
    - cron: '0 * * * *'  # Har ghante chale
  workflow_dispatch:       # Manual bhi chala sako

jobs:
  fetch:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install libraries
      run: |
        pip install feedparser pandas scikit-learn nltk numpy

    - name: Run fetch script
      run: python fetch_and_predict.py

    - name: Save results to repo
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git add live_predictions.csv
        git diff --staged --quiet || git commit -m "Live update: $(date +'%Y-%m-%d %H:%M')"
        git push
